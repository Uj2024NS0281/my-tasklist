<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tasklist</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0f172a;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 60px 20px;
  }
  .app {
    width: 100%;
    max-width: 420px;
    background: #1e293b;
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }
  h1 {
    color: #f1f5f9;
    font-size: 22px;
    margin: 0 0 4px 0;
  }
  .subtitle {
    color: #94a3b8;
    font-size: 13px;
    margin: 0 0 20px 0;
  }
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
  }
  #taskInput {
    flex: 1;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #0f172a;
    color: #f1f5f9;
    font-size: 14px;
    outline: none;
  }
  #taskInput:focus {
    border-color: #6366f1;
  }
  #addBtn {
    padding: 12px 18px;
    border-radius: 10px;
    border: none;
    background: #6366f1;
    color: white;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  #addBtn:hover { background: #818cf8; }

  ul#list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 4px;
    border-bottom: 1px solid #334155;
  }
  li:last-child { border-bottom: none; }
  li input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #6366f1;
    cursor: pointer;
  }
  li span {
    flex: 1;
    color: #e2e8f0;
    font-size: 14px;
    word-break: break-word;
  }
  li.done span {
    text-decoration: line-through;
    color: #64748b;
  }
  .delete-btn {
    background: none;
    border: none;
    color: #f87171;
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    padding: 4px 8px;
  }
  .delete-btn:hover { color: #fca5a5; }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid #334155;
  }
  #counter {
    color: #94a3b8;
    font-size: 13px;
  }
  #clearBtn {
    background: none;
    border: none;
    color: #94a3b8;
    font-size: 13px;
    cursor: pointer;
    text-decoration: underline;
  }
  #clearBtn:hover { color: #cbd5e1; }
  .empty-state {
    color: #64748b;
    font-size: 13px;
    text-align: center;
    padding: 20px 0;
  }
</style>
</head>
<body>

  <div class="app">
    <h1>Tasklist</h1>
    <p class="subtitle">Stays saved in this browser, even after refresh.</p>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a task..." />
      <button id="addBtn">Add</button>
    </div>

    <ul id="list"></ul>
    <p class="empty-state" id="emptyState">No tasks yet. Add one above.</p>

    <div class="footer">
      <span id="counter">0 tasks left</span>
      <button id="clearBtn">Clear completed</button>
    </div>
  </div>

<script>
  const STORAGE_KEY = "tasklist.tasks";
  const input = document.getElementById("taskInput");
  const addBtn = document.getElementById("addBtn");
  const list = document.getElementById("list");
  const counter = document.getElementById("counter");
  const clearBtn = document.getElementById("clearBtn");
  const emptyState = document.getElementById("emptyState");

  let tasks = loadTasks();

  function loadTasks() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch {
      return [];
    }
  }

  function saveTasks() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  function render() {
    list.innerHTML = "";
    tasks.forEach((task, index) => {
      const li = document.createElement("li");
      if (task.done) li.classList.add("done");

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = task.done;
      checkbox.addEventListener("change", () => {
        tasks[index].done = checkbox.checked;
        saveTasks();
        render();
      });

      const span = document.createElement("span");
      span.textContent = task.text;

      const delBtn = document.createElement("button");
      delBtn.className = "delete-btn";
      delBtn.textContent = "×";
      delBtn.addEventListener("click", () => {
        tasks.splice(index, 1);
        saveTasks();
        render();
      });

      li.appendChild(checkbox);
      li.appendChild(span);
      li.appendChild(delBtn);
      list.appendChild(li);
    });

    const remaining = tasks.filter(t => !t.done).length;
    counter.textContent = `${remaining} task${remaining !== 1 ? "s" : ""} left`;
    emptyState.style.display = tasks.length === 0 ? "block" : "none";
  }

  function addTask() {
    const text = input.value.trim();
    if (!text) return;
    tasks.push({ text, done: false });
    input.value = "";
    saveTasks();
    render();
  }

  addBtn.addEventListener("click", addTask);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") addTask();
  });

  clearBtn.addEventListener("click", () => {
    tasks = tasks.filter(t => !t.done);
    saveTasks();
    render();
  });

  render();
</script>

</body>
</html>
